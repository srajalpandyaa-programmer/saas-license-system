{% extends 'base.html' %}
{% block content %}
<h2>Payment History</h2>
<ul>
    {% for payment in payments %}
        <li>
            Invoice {{ payment.invoice_id }} - Amount: {{ payment.amount }} - Date: {{ payment.date }}
            <a href="/api/payments/{{ payment.id }}/">Details</a>
        </li>
    {% endfor %}
</ul>
{% endblock %}
